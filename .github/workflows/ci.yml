name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Server tests
        run: npm test -w server
        env:
          JWT_SECRET: ci-test-secret
          DISCORD_CLIENT_ID: "123456789012345678"
          DISCORD_CLIENT_SECRET: ci-test-secret

      - name: Client tests
        run: npm test -w client

      - name: Client build
        run: npm run build -w client
        env:
          VITE_DISCORD_CLIENT_ID: "123456789012345678"
          VITE_COLYSEUS_URL: /colyseus

      - name: Server build
        run: npm run build -w server
